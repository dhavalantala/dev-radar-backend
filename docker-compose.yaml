services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: devradar
    volumes:
      - mongo-data:/data/db
    networks:
      - devradar-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devradar-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    env_file:
      - .env
    networks:
      - devradar-network
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src       # hot reload — edit code, see changes

networks:
  devradar-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local